ethernet_interfaces:
- name: Ethernet49/1
  description: MLAG_s1-leaf1_Ethernet49/1
  shutdown: false
  channel_group:
    id: 491
    mode: active
  peer: s1-leaf1
  peer_interface: Ethernet49/1
  peer_type: mlag_peer
- name: Ethernet50/1
  description: MLAG_s1-leaf1_Ethernet50/1
  shutdown: false
  channel_group:
    id: 491
    mode: active
  peer: s1-leaf1
  peer_interface: Ethernet50/1
  peer_type: mlag_peer
- name: Ethernet51/1
  description: P2P_s1-spine1_Ethernet2/1
  shutdown: false
  mtu: 1500
  ip_address: 172.16.1.5/31
  peer: s1-spine1
  peer_interface: Ethernet2/1
  peer_type: spine
  switchport:
    enabled: false
- name: Ethernet52/1
  description: P2P_s1-spine2_Ethernet2/1
  shutdown: false
  mtu: 1500
  ip_address: 172.16.1.7/31
  peer: s1-spine2
  peer_interface: Ethernet2/1
  peer_type: spine
