  trunk_groups:
  - MLAG
  tenant: S1_FABRIC
vrfs:
- name: mgmt
  ip_routing: false
- name: PROD
  ip_routing: true
  tenant: S1_FABRIC
vxlan_interface:
  vxlan1:
    description: s1-leaf2_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
      virtual_router_encapsulation_mac_address: mlag-system-id
      vlans:
      - id: 10
        vni: 10010
      - id: 20
        vni: 10020
      vrfs:
      - name: PROD
        vni: 10
