    mode: active
  peer: s1-host1
  peer_interface: eth2
  peer_type: server
  port_profile: PP-VLAN10
- name: Ethernet2
  description: SERVER_s1-host3_eth2
  shutdown: false
  channel_group:
    id: 2
    mode: active
  peer: s1-host3
  peer_interface: eth2
  peer_type: server
  port_profile: PP-VLAN10
hostname: s1-leaf2
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:00:99
local_users:
- name: admin
  privilege: 15
  role: network-admin
  sha512_password: $6$arista$zo8APuuc.j2mn1Ic7FNXCUzUugtzyuFikDc5Q.Qi1RDei.U6dfH/MtlaKZJGmm6fKjD4GyYgQvVfCfYEqG1PT1
  ssh_key: ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBE5gZiH2WldfzGqDbZehL3Q7qTeQ9gWVqKrFxPsaHQaAuxqQiwc27EE1rrkqOmlaOf2ohvG/YrSJ6xESQqRPm4E=
    avd@784f9cbb6eff
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.250.1.4/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.255.1.3/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: mgmt
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: mgmt
  ip_address: 192.168.0.13/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: 7050SX3
  fabric_name: SITE1_FABRIC
  cv_tags:
    device_tags:
    - name: DC
      value: AVD-DEMO-SITE1
mlag_configuration:
  domain_id: S1_RACK1
  local_interface: Vlan4094
  peer_address: 10.251.1.0
  peer_link: Port-Channel491
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel491
  description: MLAG_s1-leaf1_Port-Channel491
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel1
  description: SERVER_s1-host1
  shutdown: false
  mlag: 1
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: access
    access_vlan: 10
- name: Port-Channel2
  description: SERVER_s1-host3
  shutdown: false
  mlag: 2
  spanning_tree_portfast: edge
  switchport:
    enabled: true
    mode: access
    access_vlan: 10
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.250.1.0/24 eq 32
  - sequence: 20
    action: permit 10.255.1.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 10.252.1.0/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65101'
  router_id: 10.250.1.4
  maximum_paths:
    paths: 4
    ecmp: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    type: ipv4
    remote_as: '65101'
    description: s1-leaf1
    next_hop_self: true
    send_community: all
    maximum_routes: 12000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    type: ipv4
    send_community: all
    maximum_routes: 12000
  - name: EVPN-OVERLAY-PEERS
    type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.252.1.0
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    peer: s1-leaf1
    description: s1-leaf1_Vlan4093
  - ip_address: 172.16.1.4
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    peer: s1-spine1
    description: s1-spine1_Ethernet2/1
  - ip_address: 172.16.1.6
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    peer: s1-spine2
    description: s1-spine2_Ethernet2/1
  - ip_address: 10.250.1.1
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    peer: s1-spine1
    description: s1-spine1_Loopback0
  - ip_address: 10.250.1.2
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    peer: s1-spine2
    description: s1-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 10
    tenant: S1_FABRIC
    rd: 10.250.1.4:10010
    route_targets:
      both:
      - 10010:10010
    redistribute_routes:
    - learned
  - id: 20
    tenant: S1_FABRIC
    rd: 10.250.1.4:10020
    route_targets:
      both:
      - 10020:10020
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: PROD
    rd: 10.250.1.4:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
    router_id: 10.250.1.4
    updates:
      wait_install: true
    neighbors:
    - ip_address: 10.252.1.0
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: s1-leaf1_Vlan3009
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 4096
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: mgmt
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 10.252.1.1/31
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 10.251.1.1/31
  mtu: 1500
  no_autostate: true
- name: Vlan10
  description: WIFI-AP-MGMT
  shutdown: false
  vrf: PROD
  ip_address_virtual: 10.10.10.1/24
  tenant: S1_FABRIC
  tags:
  - Infra
- name: Vlan20
  description: IoT
  shutdown: false
  vrf: PROD
  ip_address_virtual: 10.20.20.1/24
  tenant: S1_FABRIC
  tags:
  - Infra
- name: Vlan3009
  description: MLAG_L3_VRF_PROD
  shutdown: false
  vrf: PROD
  ip_address: 10.252.1.1/31
  mtu: 1500
  tenant: S1_FABRIC
  type: underlay_peering
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  tenant: system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  tenant: system
- id: 10
