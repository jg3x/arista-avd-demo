interface Port-Channel1
   description L2_S1_WIFI_GW_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 21,100-103
   switchport mode trunk
   switchport
   mlag 1
!
interface Port-Channel491
   description MLAG_s1-brdr2_Port-Channel491
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description L2_s1-wifi-gw1_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_s1-wifi-gw2_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet49/1
   description MLAG_s1-brdr2_Ethernet49/1
   no shutdown
   channel-group 491 mode active
!
interface Ethernet50/1
   description MLAG_s1-brdr2_Ethernet50/1
   no shutdown
   channel-group 491 mode active
!
interface Ethernet51/1
   description P2P_s1-spine1_Ethernet31/1
   no shutdown
