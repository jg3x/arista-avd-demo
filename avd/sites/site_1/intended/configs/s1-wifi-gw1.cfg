!
no enable password
no aaa root
!
username admin privilege 15 role network-admin secret sha512 $6$arista$zo8APuuc.j2mn1Ic7FNXCUzUugtzyuFikDc5Q.Qi1RDei.U6dfH/MtlaKZJGmm6fKjD4GyYgQvVfCfYEqG1PT1
username admin ssh-key ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBE5gZiH2WldfzGqDbZehL3Q7qTeQ9gWVqKrFxPsaHQaAuxqQiwc27EE1rrkqOmlaOf2ohvG/YrSJ6xESQqRPm4E= avd@784f9cbb6eff
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr= -cvauth=token-secure,/mnt/flash/cv-onboarding-token -cvvrf=mgmt -disableaaa -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -ingestexclude=/Sysdb/cell/1/agent,/Sysdb/cell/2/agent -taillogs
   no shutdown
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname s1-wifi-gw1
ip name-server vrf mgmt 8.8.8.8 priority 0
!
spanning-tree mode mstp
no spanning-tree vlan-id 4094
spanning-tree mst 0 priority 32768
!
vlan 21
   name WIFI-GW-Transit
!
vlan 100
   name S1-WIFI-USER-1
!
vlan 101
   name S1-WIFI-USER-2
!
vlan 102
   name S1-WIFI-USER-3
!
vlan 103
   name S1-WIFI-USER-4
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance mgmt
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf mgmt
      no shutdown
!
aaa authorization exec default local
!
interface Port-Channel1
   description L2_S1_BRDR_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 21,100-103
   switchport mode trunk
   switchport
   mlag 1
!
interface Port-Channel491
   description MLAG_s1-wifi-gw2_Port-Channel491
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description L2_s1-brdr1_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_s1-brdr2_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet49/1
   description MLAG_s1-wifi-gw2_Ethernet49/1
   no shutdown
   channel-group 491 mode active
!
interface Ethernet50/1
   description MLAG_s1-wifi-gw2_Ethernet50/1
   no shutdown
   channel-group 491 mode active
!
interface Loopback1
   description WiFi VTEP IP
   no shutdown
   ip address 10.255.255.1/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   vrf mgmt
   ip address 192.168.0.102/24
!
interface Vlan21
   description WIFI-GW-Transit
   ip address 10.21.21.4/24
   ip virtual-router address 10.21.21.2/24
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1500
   no autostate
   ip address 10.251.1.0/31
!
interface Vxlan1
   description WiFi VXLAN Gateway
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
   vxlan bridging vtep-to-vtep
   vxlan flood vtep learned data-plane
   vxlan vlan 100 vni 20100
   vxlan vlan 101 vni 20101
   vxlan vlan 102 vni 20102
   vxlan vlan 103 vni 20103
!
ip virtual-router mac-address 00:1c:73:99:99:99
!
ip routing
no ip routing vrf mgmt
!
mlag configuration
   domain-id S1_WIFI_GW
   local-interface Vlan4094
   peer-address 10.251.1.1
   peer-link Port-Channel491
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ip route 0.0.0.0/0 10.21.21.1
ip route vrf mgmt 0.0.0.0/0 192.168.0.1
!
ntp server vrf mgmt time1.google.com iburst
ntp server vrf mgmt time2.google.com iburst
!
end
